<div class="card mb-3 shadow-sm transition-all" [class.bg-success-subtle]="todo().isCompleted" [class.border-success]="todo().isCompleted">
  <div class="card-body">
    <div class="d-flex align-items-center justify-content-between gap-3">
      
      <div class="d-flex align-items-center gap-3 flex-grow-1">
        <input 
          class="form-check-input mt-0 fs-4 border-secondary" 
          type="checkbox" 
          [checked]="todo().isCompleted" 
          (change)="toggleCompleted()"
          title="Mark as completed"
        >

        @if (isEditing()) {
          <input 
            type="text" 
            class="form-control" 
            [(ngModel)]="editTitle" 
            (keyup.enter)="saveTitle()"
            autofocus
          >
          <button class="btn btn-sm btn-success" (click)="saveTitle()">Save</button>
          <button class="btn btn-sm btn-outline-secondary" (click)="cancelEditing()">Cancel</button>
        } @else {
          <span 
            class="fs-5 text-break" 
            [class.text-decoration-line-through]="todo().isCompleted"
            [class.text-muted]="todo().isCompleted"
          >
            {{ todo().title }}
          </span>
          <button class="btn btn-sm btn-link text-secondary p-0 ms-2 text-decoration-none" (click)="startEditing()" title="Edit title">
            Edit
          </button>
        }
      </div>

      <button class="btn btn-sm btn-outline-danger" (click)="onDelete()" title="Delete Todo">
        Delete
      </button>

    </div>

    <div class="mt-3 d-flex flex-wrap align-items-center gap-2">
      @for (cat of todo().categories; track cat.id) {
        <span class="badge rounded-pill text-bg-primary d-flex align-items-center gap-1 p-2">
          {{ cat.name }}
          <button type="button" class="btn-close btn-close-white" aria-label="Remove category" (click)="removeCategory(cat.id)"></button>
        </span>
      }

      <div class="dropdown">
        <button class="btn btn-sm btn-outline-secondary rounded-pill" type="button" (click)="showCategoryDropdown.set(!showCategoryDropdown())">
          + Category
        </button>
        
        @if (showCategoryDropdown()) {
          <div class="dropdown-menu p-3 shadow d-block border-0 shadow-lg" style="min-width: 250px;">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="dropdown-header p-0 mb-0">Assign Existing</h6>
              <button type="button" class="btn-close" (click)="showCategoryDropdown.set(false)"></button>
            </div>
            
            @for (c of unassignedCategories(); track c.id) {
              <button class="dropdown-item rounded mb-1" (click)="addCategory(c.id)">{{ c.name }}</button>
            }
            @if (unassignedCategories().length === 0) {
              <div class="dropdown-item text-muted small fst-italic">No available categories</div>
            }
            
            <hr class="dropdown-divider my-2">
            
            <h6 class="dropdown-header p-0 mb-2">Create New</h6>
            <div class="input-group input-group-sm">
              <input type="text" class="form-control" placeholder="New category name" [(ngModel)]="newCategoryName" (keyup.enter)="onCreateCategory()">
              <button class="btn btn-primary" type="button" [disabled]="!newCategoryName().trim()" (click)="onCreateCategory()">Create</button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
